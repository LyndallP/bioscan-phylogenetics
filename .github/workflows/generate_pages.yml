name: Generate Taxonium Index

# Runs whenever tree/metadata files are added to data/ or config/scripts change.
# 1. Re-enriches the global Arthropoda metadata (in_uk, in_dataset, taxonium_link).
# 2. Re-generates index.html and commits both files back to main.
# GitHub Pages must be enabled: Settings → Pages → Source: main branch / root.

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "config.json"
      - "generate_index.py"
      - "add_global_columns.py"
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update global Arthropoda metadata columns
        run: |
          if [ -f "data/Arthropoda_global/arthropoda_global_metadata_FINAL.tsv" ]; then
            python add_global_columns.py
          else
            echo "No global metadata file found — skipping add_global_columns.py"
          fi

      - name: Generate index.html
        run: python generate_index.py

      - name: Commit updated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generate index.html [skip ci]"
          file_pattern: index.html data/Arthropoda_global/arthropoda_global_metadata_FINAL.tsv
